; ifextend.CFG - ifextend.sph 用設定ファイル
; UTF-8 で記載してください。
;
; 書式（1ブロック = 1形式）
;   :タイトル行（省略可）
;   *.拡張子          （複数指定は ; 区切り。ワイルドカード不可）
;   コマンド          （%src%=対象ファイル名、%dst%=変換後bmpファイル名）
;   先頭 &  → 終了コードが 0 以外のとき失敗扱い
;   先頭 >  → コンソールウィンドウなしで実行
;   先頭 &> → 上記の組み合わせ
;
; CFG を変更した場合は、カスタマイザで ifextend.sph を再読み込みしてください。

;EnableGetPictureInfo ; コメントを外すと GetPictureInfo が有効になります


; ===========================================================================
; 有効な設定
; ===========================================================================

; PDFサムネイル（axpdf.sph + runsph.exe 経由）
; この設定を使用するときはifextend.sphのファイル形式自動判定をOFFにする。
; axpdf.sph を PPx から直接使用しないようにすること（カスタマイザで無効化）
*.pdf
&>ppbw.exe -c %Osd "%0runsph.exe" "%0axpdf.sph" "%src%" -e %'temp' "%*name(XN,"%src%")000.bmp" %:ren "%'temp'%\%*name(XN,"%src%")000.bmp" %*name(C,"%dst%")

; HEIC / AVIF（ImageMagick）
; (PPx インストールフォルダー)\tools に static 版 magick.exe と delegates.xml を配置
:Image(ImageMagick)
*.HEIC;*.AVIF
&>ppbw.exe -c %Od %g'magick' "%src%" "%dst%"

; 各種画像形式（ImageMagick）
; マルチページ形式は先頭ページ([0])のみ取得
:Image(ImageMagick)
*.dcm;*.dds;*.dng;*.eps;*.hdr;*.jbg;*.mac;*.pbm;*.pcx;*.pfm;*.pgm;*.pct;*.pdb;*.pix;*.psb;*.ras;*.sct;*.svg;*.tga;*.wbmp
&>ppbw.exe -c %Od %g'magick' "%src%[0]" "%dst%"

; CR2（32bit Susie プラグイン runspi.exe 経由）
; (PPx インストールフォルダー)\spi に runspi.exe と各 spi を配置
*.CR2
&>ppbw.exe -c %Od "%0spi\runspi.exe" "%0spi\ifcrw_t.spi" "%src%" -b "%dst%"

; DXF（AutoCAD Drawing Interchange）
:AutoCAD Drawing Interchange(DXF)
*.DXF
&>ppbw.exe -c %Od "%0spi\runspi.exe" "%0spi\ifdxfft.spi" "%src%" -b "%dst%"

; DWG（AutoCAD Drawing）
:AutoCAD Drawing(DWG)
*.DWG
&>ppbw.exe -c %Od "%0spi\runspi.exe" "%0spi\ifdwg.spi" "%src%" -b "%dst%"


; ===========================================================================
; 無効な設定（必要に応じてコメントを外して使用）
; ===========================================================================

; デジタルカメラ RAW（ImageMagick）
; ホワイトバランス補正あり版となし版を用意。どちらか一方を有効にする。
;:Digital Camera RAW(ImageMagick)
;*.ARW;*.CR3;*.CRW;*.DCR;*.DNG;*.ERF;*.KDC;*.MRW;*.NEF;*.NRW;*.MOS;*.ORF;*.PEF;*.RAF;*.RAW;*.RW2;*.RWL;*.SRF;*.SRW;*.X3F
;&>ppbw.exe -c %Od %g'magick' "%src%" -white-balance "%dst%"
;&>ppbw.exe -c %Od %g'magick' "%src%" "%dst%"

; 動画サムネイル（FFmpeg）
; 動画の 2 秒時点の画像を取得
;*.mpeg;*.mpg;*.avi;*.mp2;*.wmv;*.3gp;*.mp4;*.mov;*.qt;*.flv;*.rm;*.ram;*.asx;*.m4v;*.ogg;*.mkv
;&>ppbw.exe -c %Od %g'ffmpeg' -ss 2 -t 1 -r 1 -i "%src%" -f image2 "%dst%"

; デジタルカメラ RAW（Picturefan）
;:Image(Picturefan)
;*.3FR;*.ARW;*.BAY;*.BMQ;*.CINE;*.CR2;*.CRW;*.CS1;*.DC2;*.DCR;*.DNG;*.ERF;*.FFF;*.IA;*.KC2;*.K25;*.KDC;*.MDC;*.MEF;*.MOS;*.MRW;*.NEF;*.NRW;*.MOS;*.ORF;*.PEF;*.PXN;*.RAF;*.RAW;*.QTK;*.RDC;*.RW2;*.RWL;*.SR2;*.SRW;*.SRF;*.STI;*.X3F
;&>ppbw.exe -c %Od "%*name(DN,%g'picturefan')\picturefanCLI.exe" /threads 0 "%src%" /out-file "%dst%"

; SVG / DXF / DWG（IrfanView）
;:Image(IrfanView)
;*.SVG;*.DXF;*.DWG
;&>ppbw.exe -c %g'irfanview' "%src%" /convert="%dst%"
